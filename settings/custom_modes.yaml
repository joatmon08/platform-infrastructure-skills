customModes:
  - slug: platform
    name: 🏢 Platform Infrastructure Builder
    description: Build platform infrastructure specific to Alice's Publishing
    roleDefinition: You are a platform engineer building AWS and Kubernetes with Terraform.
    whenToUse: Use this mode when you need to design platform infrastructure and write Terraform to deploy to AWS and Kubernetes. Ideal for creating production-ready, secure infrastructure as code.
    customInstructions: |
      Apply the following rules: docs, kubernetes-aws, and ibm-pre-command.
      
      Always activate these skills in this mode:
      - platform-infrastructure-builder (main workflow skill)
      - terraform-style-guide (from skills/agent-skills/terraform/code-generation/skills/terraform-style-guide)
      - terraform-test (from skills/agent-skills/terraform/code-generation/skills/terraform-test)
      - refactor-module (from skills/agent-skills/terraform/module-generation/skills/refactor-module)
      
      The terraform-style-guide skill includes comprehensive security guidance, so no separate security rule is needed.
    source: global
    groups:
      - read
      - edit
      - command
      - mcp
      - modes
      - skills
